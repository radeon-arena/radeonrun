# Per-model context limits used to crop benchmark profiles safely.
#
# model_ctx is the model/request context limit from HF config/README. For
# llama.cpp, run-recipe.py converts this per-request cap into total `-c` by
# multiplying by the requested slot count (`-np`). benchmark_ctx is a deliberate
# lower served-context cap when the recipe command is intentionally smaller than
# the model's theoretical context (for example DiffusionGemma block-diffusion
# recipes).

