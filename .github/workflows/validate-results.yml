name: Validate recipes and result bundle

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install pyyaml
      - name: Validate recipe/result structure
        run: |
          python - <<'PY'
          import glob, json, os, sys, yaml
          ok = True
          for p in sorted(glob.glob('recipes/*.yaml')):
              d = yaml.safe_load(open(p))
              for k in ('name', 'model', 'source', 'container', 'command'):
                  if not d.get(k):
                      print(f'{p}: missing {k}')
                      ok = False
              if d.get('image_tag') in (None, '', 'latest') and not str(d.get('container', '')).startswith('ghcr.io/'):
                  print(f'{p}: missing pinned image_tag')
                  ok = False
          for p in sorted(glob.glob('results/*/*.json')):
              if '/results/strix/' not in p and '/results/w7900/' not in p and '/results/r9700/' not in p:
                  continue
              stem = os.path.splitext(os.path.basename(p))[0]
              if not os.path.exists(f'recipes/{stem}.yaml'):
                  print(f'{p}: missing recipes/{stem}.yaml')
                  ok = False
              d = json.load(open(p))
              if not d.get('measurements'):
                  print(f'{p}: no measurements')
                  ok = False
              for m in d.get('measurements', []):
                  if ('decode_toks_per_s' not in m and 'prefill_toks_per_s' not in m) or 'concurrency' not in m:
                      print(f'{p}: incomplete measurement {m}')
                      ok = False
                  if d.get('profile') == 'halo-arena-v2' and 'depth' not in m:
                      print(f'{p}: v2 measurement missing depth {m}')
                      ok = False
          if not ok:
              sys.exit(1)
          PY
      - name: Validate bundle coverage
        run: |
          python - <<'PY'
          import glob, json, os, sys
          idx = json.load(open('results/index.json'))
          bundle = json.load(open('results/bundle.json'))
          ok = True
          for dev in ('strix', 'w7900', 'r9700'):
              files = sorted(os.path.basename(p) for p in glob.glob(f'results/{dev}/*.json'))
              if idx.get('devices', {}).get(dev, []) != files:
                  print(f'index mismatch for {dev}')
                  ok = False
              bundled = sorted(os.path.basename(r['file']) for r in bundle.get('records', {}).get(dev, []))
              if bundled != files:
                  print(f'bundle mismatch for {dev}')
                  ok = False
          if not ok:
              sys.exit(1)
          PY
