name: Validate recipes and result bundle

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install pyyaml
      - name: Verify generated manifests
        run: python scripts/build-results-bundle.py --check
      - name: Validate configs, results, and bundle
        run: python scripts/validate-configs.py
      - name: Test standalone matrix resolution
        run: python scripts/test-configs.py
      - name: Test Docker command selection
        run: python scripts/test-docker-command.py
      - name: Test GPU idle parser
        run: |
          python -c 'from scripts.check_gpu_idle import gpu_use_values; assert gpu_use_values("GPU[0] : GPU use (%): 7\nGPU[1] : GPU use (%): 0") == [7, 0]'
