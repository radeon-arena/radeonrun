name: Validate recipes and result bundle

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install pyyaml
      - name: Verify generated manifests
        run: python scripts/build-results-bundle.py --check
      - name: Validate configs, results, and bundle
        run: python scripts/validate-configs.py
      - name: Test standalone matrix resolution
        run: python scripts/test-configs.py
