name: Reproduce recipe

# Reproduce a leaderboard recipe end-to-end on a self-hosted Radeon runner:
# prepare the image (build from dockerfiles/ or pull) + download the model from
# its `source`, serve it, run the benchmark profile, then tear everything down.
#
# Auth note: ghcr login uses the built-in GITHUB_TOKEN — there is NO personal
# access token to create or store. `permissions: packages: write` is what grants
# that token push rights, so `--push` can sync a freshly built image back to
# ghcr.io/radeon-arena/<device>-<engine> for the next run to just pull.

on:
  workflow_dispatch:
    inputs:
      recipe:
        description: "Recipe name (without .yaml), e.g. qwen3-8b-q4-k-m-llamacpp"
        required: true
        default: qwen3-8b-q4-k-m-llamacpp
      device:
        description: "Device profile"
        required: true
        default: halo
        type: choice
        options: [halo, w7900, r9700]
      profile:
        description: "Benchmark profile"
        required: true
        default: halo-arena-v1.yaml
        type: choice
        options: [halo-arena-v1.yaml, halo-arena-v2.yaml]
      image:
        description: "Optional full OCI image ref (Docker Hub, GHCR, Quay, private registry, etc.)"
        required: false
        default: ""
        type: string
      registry:
        description: "Default registry for RadeonRun-built images when image is empty"
        required: false
        default: "ghcr.io/radeon-arena"
        type: string
      pull_policy:
        description: "Container image pull policy"
        required: true
        default: missing
        type: choice
        options: [missing, always, never]

permissions:
  contents: write       # commit the reproduced result + bundle back to the branch
  packages: write        # lets the built-in GITHUB_TOKEN push images to ghcr

jobs:
  reproduce:
    runs-on: ${{ fromJSON(inputs.device == 'r9700' && '["self-hosted","gfx1201"]' || inputs.device == 'w7900' && '["self-hosted","gfx1100"]' || '["self-hosted","gfx1151"]') }}
    steps:
      - name: Checkout repository via codeload tarball
        run: |
          set -euo pipefail
          rm -rf ./* ./.??* 2>/dev/null || true
          curl -fL --connect-timeout 20 --max-time 120 \
            -o /tmp/radeonrun-${GITHUB_RUN_ID}.tgz \
            "https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          tar -xzf /tmp/radeonrun-${GITHUB_RUN_ID}.tgz --strip-components=1
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git checkout -B "${GITHUB_REF_NAME:-main}"
          git add .
          git -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "checkout ${GITHUB_SHA}" >/dev/null

      - name: Install runner deps (hf CLI + PyYAML + XET)
        run: |
          python3 -m pip install --user --break-system-packages --upgrade pyyaml 'huggingface_hub[cli]' hf_xet
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Log in to ghcr (for RadeonRun defaults; external registries use runner credentials)
        run: |
          docker_cmd=(docker)
          docker info >/dev/null 2>&1 || docker_cmd=(sudo -n docker)
          echo "${{ secrets.GITHUB_TOKEN }}" | "${docker_cmd[@]}" login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Reproduce — setup (build+push image, download model) → serve → bench → teardown
        run: |
          device="${{ inputs.device }}"
          cleanup=()
          case "$device" in
            halo)
              MODELS_DIR="${RUNNER_TEMP}/models"
              cleanup=(--cleanup)
              ;;
            w7900)
              MODELS_DIR="/home/lkang/radeonrun-models-w7900d2"
              ;;
            r9700)
              MODELS_DIR="/home/lkang/radeonrun-models-r9700"
              export RADEONRUN_DOCKER="sudo -n docker"
              ;;
          esac
          export MODELS_DIR
            python3 - "${{ inputs.recipe }}" "$device" "${{ inputs.image }}" <<'PY'
            import sys
            from radeonrun_config import load_run_config, resolve_image

            recipe_id, requested_device, image_override = sys.argv[1:]
            config = load_run_config(recipe_id)
            matrix_device = str((config.get("_device") or {}).get("id") or "halo")
            if requested_device == "r9700" and matrix_device != "r9700":
              raise SystemExit(
                f"R9700 requires a dedicated device:r9700 matrix; {recipe_id} targets {matrix_device}"
              )
            image = resolve_image(config, requested_device, image_override=image_override or None)
            if requested_device == "r9700" and "@sha256:" not in image:
              raise SystemExit(f"R9700 image must be digest-pinned, got {image}")
            print(f"preflight: matrix={recipe_id} device={requested_device} image={image}")
            PY
          if [ "$device" = "halo" ]; then
            sync
            sudo -n sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
            free -h
          elif [ "$device" = "r9700" ]; then
            python3 scripts/check_gpu_idle.py --expected-gpus 8 --max-use 10
          elif [ "$device" = "w7900" ]; then
            python3 scripts/check_gpu_idle.py --expected-gpus 2 --max-use 10
          fi
          mkdir -p "$MODELS_DIR" results
          args=(
            "${{ inputs.recipe }}"
            --device "${{ inputs.device }}"
            --benchmark "benchmarking/${{ inputs.profile }}"
            --out results/
            --registry "${{ inputs.registry }}"
            --pull-policy "${{ inputs.pull_policy }}"
            --build --push
            "${cleanup[@]}"
          )
          if [ -n "${{ inputs.image }}" ]; then
            args+=(--image "${{ inputs.image }}")
          fi
          python3 run-recipe.py "${args[@]}"

      - name: Commit reproduced result and bundle
        run: |
          set -euo pipefail
          test -f "results/${{ inputs.recipe }}.json"
          tmp_result="$(mktemp)"
          cp "results/${{ inputs.recipe }}.json" "$tmp_result"
          device="${{ inputs.device }}"
          case "$device" in
            halo) dir=strix ;;
            w7900) dir=w7900 ;;
            r9700) dir=r9700 ;;
            *) echo "unknown device: $device" >&2; exit 2 ;;
          esac
          branch="${GITHUB_REF_NAME:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin "$branch"
            git reset --hard "origin/$branch"
            mkdir -p "results/$dir"
            cp "$tmp_result" "results/$dir/${{ inputs.recipe }}.json"
            python3 scripts/build-results-bundle.py
            git add "results/$dir/${{ inputs.recipe }}.json" results/index.json results/bundle.json
            if git diff --cached --quiet; then
              echo "No result changes to commit."
              exit 0
            fi
            git commit -m "results: reproduce ${{ inputs.recipe }} on $dir"
            if git push origin "HEAD:$branch"; then
              exit 0
            fi
            echo "Push failed, retrying on latest origin/$branch (attempt $attempt)" >&2
          done
          echo "Failed to push reproduced result after retries" >&2
          exit 1

      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ inputs.recipe }}
          path: results/
