name: Reproduce recipe

# Reproduce a leaderboard recipe end-to-end on a self-hosted Radeon runner:
# prepare the image (build from dockerfiles/ or pull) + download the model from
# its `source`, serve it, run the benchmark profile, then tear everything down.
#
# Auth note: ghcr login uses the built-in GITHUB_TOKEN — there is NO personal
# access token to create or store. `permissions: packages: write` is what grants
# that token push rights, so `--push` can sync a freshly built image back to
# ghcr.io/radeon-arena/<device>-<engine> for the next run to just pull.

on:
  workflow_dispatch:
    inputs:
      recipe:
        description: "Recipe name (without .yaml), e.g. qwen3-8b-q4-k-m-llamacpp"
        required: true
        default: qwen3-8b-q4-k-m-llamacpp
      device:
        description: "Device profile"
        required: true
        default: halo
        type: choice
        options: [halo, w7900, r9700]
      runner:
        description: "Self-hosted runner target (halo only)"
        required: true
        default: any
        type: choice
        options: [any, halo3-gfx1151, halo4-gfx1151, halo5-gfx1151, halo6-gfx1151]

permissions:
  contents: write       # commit the reproduced result + bundle back to the branch
  packages: write        # lets the built-in GITHUB_TOKEN push images to ghcr

jobs:
  reproduce:
    runs-on: ${{ inputs.runner == 'any' && fromJSON('["self-hosted","gfx1151"]') || fromJSON(format('["self-hosted","{0}"]', inputs.runner)) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install runner deps (hf CLI + PyYAML + XET)
        run: |
          python3 -m pip install --user --break-system-packages --upgrade pyyaml 'huggingface_hub[cli]' hf_xet
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Log in to ghcr (built-in GITHUB_TOKEN — no PAT)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Reproduce — setup (build+push image, download model) → serve → bench → teardown
        env:
          # Optional — every recipe's model repo is currently fully public
          # (verified: unsloth / Qwen / google / stepfun-ai / cyankiwi / nameistoken
          # all download without a token). Kept only for a future private model.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODELS_DIR: ${{ runner.temp }}/models    # per-job scratch; --cleanup also wipes it
        run: |
          if [ "${{ inputs.device }}" = "halo" ]; then
            sync
            sudo -n sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
            free -h
          fi
          mkdir -p "$MODELS_DIR" results
          python3 run-recipe.py "${{ inputs.recipe }}" \
            --device "${{ inputs.device }}" \
            --benchmark benchmarking/halo-arena-v2.yaml \
            --out results/ \
            --build --push --cleanup

      - name: Commit reproduced result and bundle
        run: |
          set -euo pipefail
          test -f "results/${{ inputs.recipe }}.json"
          device="${{ inputs.device }}"
          case "$device" in
            halo) dir=strix ;;
            w7900) dir=w7900 ;;
            r9700) dir=r9700 ;;
            *) echo "unknown device: $device" >&2; exit 2 ;;
          esac
          mkdir -p "results/$dir"
          mv "results/${{ inputs.recipe }}.json" "results/$dir/${{ inputs.recipe }}.json"
          python3 scripts/build-results-bundle.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "results/$dir/${{ inputs.recipe }}.json" results/index.json results/bundle.json
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "results: reproduce ${{ inputs.recipe }} on $dir"
            git push
          fi

      - name: Trigger Radeon Arena Pages rebuild
        if: success()
        env:
          ARENA_PAGES_PAT: ${{ secrets.ARENA_PAGES_PAT }}
        run: |
          if [ -z "${ARENA_PAGES_PAT:-}" ]; then
            echo "ARENA_PAGES_PAT is not configured; skip cross-repo Pages rebuild."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $ARENA_PAGES_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/radeon-arena/radeon-arena/actions/workflows/pages.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ inputs.recipe }}
          path: results/
