catalog_version: "1"
launches:
  llamacpp-hip:
    runtime: llamacpp
    container: llamacpp
    image:
      by_device:
        halo: {tag: fe7c8b2414}
      build: {framework: llamacpp}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      llama-server -m {model.path} -ngl 999 -fa on --host {host} --port {port} -c {ctx} -np {nseq}

  llamacpp-hip-no-mmap:
    runtime: llamacpp
    container: llamacpp
    image:
      by_device:
        halo: {tag: fe7c8b2414}
      build: {framework: llamacpp}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      llama-server -m {model.path} -ngl 999 -fa on --no-mmap --host {host} --port {port} -c {ctx} -np {nseq}

  llamacpp-hip-mimo:
    runtime: llamacpp
    container: llamacpp
    image:
      by_device:
        halo: {tag: fe7c8b2414}
      build: {framework: llamacpp}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      llama-server -m {model.path} -ngl 999 -fa off --no-mmap --host {host} --port {port} -c {ctx} -np {nseq}

  vllm-bf16-triton:
    runtime: vllm
    container: vllm
    image:
      by_device:
        halo: {tag: f5fa386fe}
      build: {framework: vllm}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      vllm serve {model.path} --host {host} --port {port} --served-model-name {model.served_name}
      --max-num-seqs {nseq} --dtype bfloat16 --attention-backend TRITON_ATTN
      --max-model-len {ctx} --gpu-memory-utilization 0.85

  vllm-bf16-triton-no-gmu:
    runtime: vllm
    container: vllm
    image:
      by_device:
        halo: {tag: f5fa386fe}
      build: {framework: vllm}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      vllm serve {model.path} --host {host} --port {port} --max-num-seqs {nseq}
      --dtype bfloat16 --attention-backend TRITON_ATTN --served-model-name {model.served_name}
      --max-model-len {ctx}

  vllm-bf16:
    runtime: vllm
    container: vllm
    image:
      by_device:
        halo: {tag: f5fa386fe}
      build: {framework: vllm}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      vllm serve {model.path} --host {host} --port {port} --served-model-name {model.served_name}
      --max-num-seqs {nseq} --dtype bfloat16 --max-model-len {ctx} --gpu-memory-utilization 0.9

  vllm-awq-triton:
    runtime: vllm
    container: vllm
    image:
      by_device:
        halo: {tag: f5fa386fe}
      build: {framework: vllm}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      vllm serve {model.path} --host {host} --port {port} --served-model-name {model.served_name}
      --max-num-seqs {nseq} --dtype float16 --attention-backend TRITON_ATTN
      --max-model-len {ctx} --gpu-memory-utilization 0.85

  vllm-awq:
    runtime: vllm
    container: vllm
    image:
      by_device:
        halo: {tag: f5fa386fe}
      build: {framework: vllm}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      vllm serve {model.path} --host {host} --port {port} --served-model-name {model.served_name}
      --max-num-seqs {nseq} --dtype float16 --max-model-len {ctx} --gpu-memory-utilization 0.85

  vllm-quark:
    runtime: vllm
    container: vllm
    image:
      by_device:
        halo: {tag: f5fa386fe}
      build: {framework: vllm}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env: {}
    mods: []
    command: >-
      vllm serve {model.path} --host {host} --port {port} --served-model-name {model.served_name}
      --max-num-seqs {nseq} --quantization quark --max-model-len {ctx} --gpu-memory-utilization 0.85

  vllm-autoround-gptq:
    runtime: vllm
    container: vllm
    image:
      by_device:
        halo: {tag: f5fa386fe}
      build: {framework: vllm}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32}
    env:
      FLASH_ATTENTION_TRITON_AMD_ENABLE: "TRUE"
      TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL: "1"
      TORCH_BLAS_PREFER_HIPBLASLT: "1"
      VLLM_DISABLE_COMPILE_CACHE: "1"
      TORCHINDUCTOR_AUTOGRAD_CACHE: "0"
      VLLM_MOE_HYBRID_W4A16: "1"
      PYTORCH_ROCM_ARCH: gfx1151
    mods: []
    command: >-
      vllm serve {model.path} --served-model-name {model.served_name} --host {host} --port {port}
      --trust-remote-code --dtype float16 --max-model-len {ctx} --max-num-seqs {nseq}
      --max-num-batched-tokens 8192 --gpu-memory-utilization 0.85 --attention-backend TRITON_ATTN
      --mm-encoder-attn-backend TRITON_ATTN --quantization gptq

  vllm-main-diffusion:
    runtime: vllm-main
    container: vllm-main
    image:
      by_device:
        halo: {tag: 92221485a}
      build: {framework: vllm-main}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 4}
    env: {}
    mods: []
    command: >-
      vllm serve {model.path} --served-model-name {model.served_name} --host {host} --port {port}
      --max-model-len 896 --max-num-seqs {nseq} --gpu-memory-utilization 0.6
      --generation-config vllm
      --hf-overrides '{"diffusion_sampler":"entropy_bound","diffusion_entropy_bound":0.1}'
      --diffusion-config '{"canvas_length":256}'

  r9700-llamacpp-hip:
    runtime: llamacpp
    backend: ROCm/HIP
    container: llamacpp
    image:
      ref: ghcr.io/inferstation/llama-rocm-r9700@sha256:5096deff2b8a02aa0b48b02e572bdbaf9bdc4e877da02252fca74a263a82f3b5
    topology: {node_count: 1, gpu_count: 1, tensor_parallel_size: 1}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32, ctx: 32768}
    env:
      HIP_VISIBLE_DEVICES: "0"
      ROCR_VISIBLE_DEVICES: "0"
      LD_LIBRARY_PATH: /app:/opt/rocm/lib
    mods: []
    command: >-
      llama-server -m {model.path} -ngl 999 -fa on --host {host} --port {port} -c {ctx} -np {nseq}

  r9700-vllm-tp1:
    runtime: vllm
    backend: ROCm/HIP · TRITON_ATTN
    container: vllm
    image:
      ref: ghcr.io/inferstation/vllm-rocm-r9700-main@sha256:2d3a6275b1000cc9dce4c105dae899edd95d77875ede0c4d5d9b9c53a29faaf1
    topology: {node_count: 1, gpu_count: 1, tensor_parallel_size: 1}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32, ctx: 8192}
    env:
      HIP_VISIBLE_DEVICES: "0"
      ROCR_VISIBLE_DEVICES: "0"
      TRITON_CACHE_DIR: /models/.triton-cache
    mods: []
    command: >-
      vllm serve {model.path} --served-model-name {model.served_name}
      --host {host} --port {port} --trust-remote-code --dtype bfloat16
      --max-model-len {ctx} --max-num-seqs {nseq} --gpu-memory-utilization 0.85
      --attention-backend TRITON_ATTN

  r9700-vllm-tp2:
    runtime: vllm
    backend: ROCm/HIP · TRITON_ATTN
    container: vllm
    image:
      ref: ghcr.io/inferstation/vllm-rocm-r9700-main@sha256:2d3a6275b1000cc9dce4c105dae899edd95d77875ede0c4d5d9b9c53a29faaf1
    topology: {node_count: 1, gpu_count: 2, tensor_parallel_size: 2}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32, ctx: 2304}
    env:
      HIP_VISIBLE_DEVICES: "0,1"
      ROCR_VISIBLE_DEVICES: "0,1"
      NCCL_PROTO: Simple
      NCCL_P2P_DISABLE: "1"
      TRITON_CACHE_DIR: /models/.triton-cache
    mods: []
    command: >-
      vllm serve {model.path} --served-model-name {model.served_name}
      --host {host} --port {port} --trust-remote-code --dtype bfloat16
      --max-model-len {ctx} --max-num-seqs {nseq} --gpu-memory-utilization 0.90
      --attention-backend TRITON_ATTN --tensor-parallel-size 2

  r9700-vllm-tp4:
    runtime: vllm
    backend: ROCm/HIP · TRITON_ATTN
    container: vllm
    image:
      ref: ghcr.io/inferstation/vllm-rocm-r9700-main@sha256:2d3a6275b1000cc9dce4c105dae899edd95d77875ede0c4d5d9b9c53a29faaf1
    topology: {node_count: 1, gpu_count: 4, tensor_parallel_size: 4}
    defaults: {port: 8000, host: 0.0.0.0, nseq: 32, ctx: 2304}
    env:
      HIP_VISIBLE_DEVICES: "0,1,2,3"
      ROCR_VISIBLE_DEVICES: "0,1,2,3"
      NCCL_PROTO: Simple
      NCCL_P2P_DISABLE: "1"
      TRITON_CACHE_DIR: /models/.triton-cache
    mods: []
    command: >-
      vllm serve {model.path} --served-model-name {model.served_name}
      --host {host} --port {port} --trust-remote-code --dtype bfloat16
      --max-model-len {ctx} --max-num-seqs {nseq} --gpu-memory-utilization 0.85
      --attention-backend TRITON_ATTN --tensor-parallel-size 4
