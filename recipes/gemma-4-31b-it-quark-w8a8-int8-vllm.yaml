# Recipe: Gemma-4-31B-it (Quark-W8A8-INT8) on Strix Halo - vllm
# VERIFIED on InferStation (gfx1151). Best measured decode ~14.5 tok/s
# (in512/out128 streaming). serve cmd is the one run on InferStation's gfx1151 fleet.

recipe_version: "2"
metadata:
  description: vllm serving Gemma-4-31B-it (Quark-W8A8-INT8) on Strix Halo
  maintainer: radeon-arena
  quantization: Quark-W8A8-INT8
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 14.5
name: gemma-4-31b-it-quark-w8a8-int8
description: vllm serving Gemma-4-31B-it (Quark-W8A8-INT8) on Strix Halo
model: /models/Gemma-4-31B-it-Quark-W8A8-INT8
source: nameistoken/Gemma-4-31B-it-Quark-W8A8-INT8   # HF repo the runner stages this model from (run-recipe.py --setup)
container: vllm
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
env: {}
command: |
  vllm serve /models/Gemma-4-31B-it-Quark-W8A8-INT8 --host 0.0.0.0 --port {port} --served-model-name g31q --max-num-seqs {nseq} --quantization quark --max-model-len 2304 --gpu-memory-utilization 0.85
