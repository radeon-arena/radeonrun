# Recipe: Qwen3-32B (Q4_K_M) on Strix Halo - llamacpp
# VERIFIED on InferStation (gfx1151). Best measured decode ~191.7 tok/s
# (in512/out128 streaming). serve cmd is the one run on InferStation's gfx1151 fleet.

recipe_version: "2"
metadata:
  description: llamacpp serving Qwen3-32B (Q4_K_M) on Strix Halo
  maintainer: radeon-arena
  quantization: Q4_K_M
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 191.7
name: qwen3-32b-q4-k-m
description: llamacpp serving Qwen3-32B (Q4_K_M) on Strix Halo
model: /models/Qwen3-32B/Qwen3-32B-Q4_K_M.gguf
source: unsloth/Qwen3-32B-GGUF   # HF repo the runner stages this model from (run-recipe.py --setup)
container: llamacpp
# Perf-leaderboard pin (Radeon Arena tracks numbers, not image releases): this
# number was produced by llama.cpp commit fe7c8b2414. Pinned for reproducibility
# — CI --build otherwise rebuilds llama.cpp master HEAD each run and drifts.
image_tag: fe7c8b2414
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 32768
env: {}
command: |
  llama-server -m /models/Qwen3-32B/Qwen3-32B-Q4_K_M.gguf -ngl 999 -fa on --host 0.0.0.0 --port {port} -c {ctx} -np {nseq}
