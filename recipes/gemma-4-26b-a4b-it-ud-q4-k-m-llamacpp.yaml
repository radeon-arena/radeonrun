# Recipe: Gemma-4-26B-A4B-it (UD-Q4_K_M) on Strix Halo - llamacpp
# VERIFIED on InferStation (gfx1151). Best measured decode ~124.8 tok/s
# (in512/out128 streaming). serve cmd is the one run on InferStation's gfx1151 fleet.

recipe_version: "2"
metadata:
  description: llamacpp serving Gemma-4-26B-A4B-it (UD-Q4_K_M) on Strix Halo
  maintainer: radeon-arena
  quantization: UD-Q4_K_M
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 124.8
name: gemma-4-26b-a4b-it-ud-q4-k-m
description: llamacpp serving Gemma-4-26B-A4B-it (UD-Q4_K_M) on Strix Halo
model: /models/Gemma-4-26B-A4B-it-smoke/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf
source: unsloth/gemma-4-26B-A4B-it-GGUF   # HF repo the runner stages this model from (run-recipe.py --setup)
container: llamacpp
# Perf-leaderboard pin (Radeon Arena tracks numbers, not image releases): this
# decode rate was produced by llama.cpp commit fe7c8b2414. Newer :latest builds
# regressed the qwen3.6 / gemma-4 architecture ~8-18% at c=1 (up to ~50% at high
# concurrency), verified by controlled old-vs-new A/B on gfx1151 (2026-06-27).
image_tag: fe7c8b2414
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 32768
env: {}
command: |
  llama-server -m /models/Gemma-4-26B-A4B-it-smoke/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf -ngl 999 -fa on --host 0.0.0.0 --port {port} -c {ctx} -np {nseq}
