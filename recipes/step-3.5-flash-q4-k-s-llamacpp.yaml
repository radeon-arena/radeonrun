# Recipe: Step-3.5-Flash (Q4_K_S) on Strix Halo - llamacpp
# VERIFIED on InferStation (gfx1151). Best measured decode ~40.6 tok/s
# (in512/out128 streaming). serve cmd is the one run on InferStation's gfx1151 fleet.

recipe_version: "2"
metadata:
  description: llamacpp serving Step-3.5-Flash (Q4_K_S) on Strix Halo
  maintainer: radeon-arena
  quantization: Q4_K_S
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 40.6
name: step-3-5-flash-q4-k-s
description: llamacpp serving Step-3.5-Flash (Q4_K_S) on Strix Halo
model: /models/Step-3.5-Flash-GGUF-Q4_K_S/step3p5_flash_Q4_K_S-00001-of-00012.gguf
source: stepfun-ai/Step-3.5-Flash-GGUF-Q4_K_S   # HF repo the runner stages this model from (run-recipe.py --setup)
container: llamacpp
# Perf-leaderboard pin (Radeon Arena tracks numbers, not image releases): this
# number was produced by llama.cpp commit fe7c8b2414. Pinned for reproducibility
# — CI --build otherwise rebuilds llama.cpp master HEAD each run and drifts.
image_tag: fe7c8b2414
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 32768
env: {}
command: |
  llama-server -m /models/Step-3.5-Flash-GGUF-Q4_K_S/step3p5_flash_Q4_K_S-00001-of-00012.gguf -ngl 999 -fa on --no-mmap --host 0.0.0.0 --port {port} -c {ctx} -np {nseq}
