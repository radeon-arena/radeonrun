# Recipe: Gemma-4-26B-A4B-it (BF16) on Strix Halo - vllm
# VERIFIED on InferStation (gfx1151). Best measured decode ~209.3 tok/s
# (in512/out128 streaming). serve cmd is the one run on InferStation's gfx1151 fleet.

recipe_version: "2"
metadata:
  description: vllm serving Gemma-4-26B-A4B-it (BF16) on Strix Halo
  maintainer: radeon-arena
  quantization: BF16
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 209.3
name: gemma-4-26b-a4b-it-bf16
description: vllm serving Gemma-4-26B-A4B-it (BF16) on Strix Halo
model: /models/gemma-4-26B-A4B-it
source: google/gemma-4-26b-a4b-it   # HF repo the runner stages this model from (run-recipe.py --setup)
container: vllm
# Perf-leaderboard pin (Radeon Arena tracks numbers, not image releases): this
# number was produced by vLLM (ROCm gfx11) commit f5fa386fe. Pinned so the entry
# reproduces from this exact build instead of the moving :latest tag.
image_tag: f5fa386fe
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
env: {}
command: |
  vllm serve /models/gemma-4-26B-A4B-it --host 0.0.0.0 --port {port} --served-model-name g26b --max-num-seqs {nseq} --dtype bfloat16 --attention-backend TRITON_ATTN --max-model-len 2304 --gpu-memory-utilization 0.85
