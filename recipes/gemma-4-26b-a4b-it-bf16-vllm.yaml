# Recipe: Gemma-4-26B-A4B-it (BF16) on Strix Halo - vllm
# VERIFIED on InferStation (gfx1151). Best measured decode ~209.3 tok/s
# (in512/out128 streaming). serve cmd is the one run on halo5/halo6.

recipe_version: "2"
metadata:
  description: vllm serving Gemma-4-26B-A4B-it (BF16) on Strix Halo
  maintainer: radeon-arena
  quantization: BF16
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 209.3
name: gemma-4-26b-a4b-it-bf16
description: vllm serving Gemma-4-26B-A4B-it (BF16) on Strix Halo
model: /models/gemma-4-26B-A4B-it
container: vllm
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
env: {}
command: |
  vllm serve /models/gemma-4-26B-A4B-it --host 0.0.0.0 --port {port} --max-num-seqs {nseq} --dtype bfloat16 --attention-backend TRITON_ATTN --max-model-len 2304 --gpu-memory-utilization 0.85
