# Recipe: Gemma-4-26B-A4B-it (AWQ-4bit) on Strix Halo - vllm
# VERIFIED on InferStation (gfx1151). Best measured decode ~91.4 tok/s
# (in512/out128 streaming). serve cmd is the one run on InferStation's gfx1151 fleet.

recipe_version: "2"
metadata:
  description: vllm serving Gemma-4-26B-A4B-it (AWQ-4bit) on Strix Halo
  maintainer: radeon-arena
  quantization: AWQ-4bit
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 91.4
name: gemma-4-26b-a4b-it-awq-4bit
description: vllm serving Gemma-4-26B-A4B-it (AWQ-4bit) on Strix Halo
model: /models/gemma-4-26B-A4B-it-AWQ-4bit
source: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit   # HF repo the runner stages this model from (run-recipe.py --setup)
container: vllm
# Perf-leaderboard pin (Radeon Arena tracks numbers, not image releases): this
# number was produced by vLLM (ROCm gfx11) commit f5fa386fe. Pinned so the entry
# reproduces from this exact build instead of the moving :latest tag.
image_tag: f5fa386fe
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
env: {}
command: |
  vllm serve /models/gemma-4-26B-A4B-it-AWQ-4bit --host 0.0.0.0 --port {port} --served-model-name g26bawq --max-num-seqs {nseq} --dtype float16 --max-model-len 2304 --gpu-memory-utilization 0.85
