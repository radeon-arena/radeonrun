# Recipe: Qwen3.6-27B (BF16) on Strix Halo - vllm
# VERIFIED on InferStation (gfx1151). Best measured decode ~124.3 tok/s
# (in512/out128 streaming). serve cmd is the one run on halo5/halo6.

recipe_version: "2"
metadata:
  description: vllm serving Qwen3.6-27B (BF16) on Strix Halo
  maintainer: JoursBleu
  quantization: BF16
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 124.3
name: qwen3-6-27b-bf16
description: vllm serving Qwen3.6-27B (BF16) on Strix Halo
model: /models/Qwen3.6-27B
container: halo-vllm-node
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
env: {}
command: |
  vllm serve /models/Qwen3.6-27B --host 0.0.0.0 --port {port} --max-num-seqs {nseq} --dtype bfloat16 --max-model-len 2304 --gpu-memory-utilization 0.85
