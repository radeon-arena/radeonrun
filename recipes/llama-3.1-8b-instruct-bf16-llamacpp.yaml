# Recipe: Llama-3.1-8B-Instruct (BF16) on Strix Halo - llamacpp
# VERIFIED on InferStation (gfx1151). Best measured decode ~77.3 tok/s
# (in512/out128 streaming). serve cmd is the one run on halo5/halo6.

recipe_version: "2"
metadata:
  description: llamacpp serving Llama-3.1-8B-Instruct (BF16) on Strix Halo
  maintainer: JoursBleu
  quantization: BF16
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 77.3
name: llama-3-1-8b-instruct-bf16
description: llamacpp serving Llama-3.1-8B-Instruct (BF16) on Strix Halo
model: /models/Llama-3.1-8B-Instruct/Llama-3.1-8B-Instruct-BF16.gguf
container: halo-llamacpp-node
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 32768
env: {}
command: |
  llama-server -m /models/Llama-3.1-8B-Instruct/Llama-3.1-8B-Instruct-BF16.gguf -ngl 999 -fa on --host 0.0.0.0 --port {port} -c {ctx} -np {nseq}
