# Recipe: Qwen3-4B (Q8_0) on Strix Halo - llamacpp
# VERIFIED on InferStation (gfx1151). Best measured decode ~173.6 tok/s
# (in512/out128 streaming). serve cmd is the one run on halo5/halo6.

recipe_version: "1"
name: qwen3-4b-q8-0
description: llamacpp serving Qwen3-4B (Q8_0) on Strix Halo
model: /models/Qwen3-4B/Qwen3-4B-Q8_0.gguf
container: halo-llamacpp-node
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 32768
env: {}
command: |
  llama-server -m /models/Qwen3-4B/Qwen3-4B-Q8_0.gguf -ngl 999 -fa on --host 0.0.0.0 --port {port} -c {ctx} -np {nseq}
