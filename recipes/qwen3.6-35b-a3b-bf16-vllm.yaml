# Recipe: Qwen3.6-35B-A3B (BF16) on Strix Halo - vllm
# VERIFIED on InferStation (gfx1151). Best measured decode ~124.3 tok/s
# (in512/out128 streaming). serve cmd is the one run on InferStation's gfx1151 fleet.

recipe_version: "2"
metadata:
  description: vllm serving Qwen3.6-35B-A3B (BF16) on Strix Halo
  maintainer: radeon-arena
  quantization: BF16
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 124.3
name: qwen3-6-35b-a3b-bf16
description: vllm serving Qwen3.6-35B-A3B (BF16) on Strix Halo
model: /models/Qwen3.6-35B-A3B
source: Qwen/Qwen3.6-35B-A3B   # HF repo the runner stages this model from (run-recipe.py --setup)
container: vllm
# Perf-leaderboard pin (Radeon Arena tracks numbers, not image releases): this
# number was produced by vLLM (ROCm gfx11) commit f5fa386fe. Pinned so the entry
# reproduces from this exact build instead of the moving :latest tag.
image_tag: f5fa386fe
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 131072
env: {}
command: |
  vllm serve /models/Qwen3.6-35B-A3B --host 0.0.0.0 --port {port} --max-num-seqs {nseq} --dtype bfloat16 --attention-backend TRITON_ATTN --served-model-name qwen36-35b --max-model-len {ctx}
