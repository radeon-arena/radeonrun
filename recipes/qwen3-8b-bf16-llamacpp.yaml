# Recipe: Qwen3-8B (BF16) on Strix Halo - llamacpp
# VERIFIED on InferStation (gfx1151). Best measured decode ~153.7 tok/s
# (in512/out128 streaming). serve cmd is the one run on halo5/halo6.

recipe_version: "2"
metadata:
  description: llamacpp serving Qwen3-8B (BF16) on Strix Halo
  maintainer: JoursBleu
  quantization: BF16
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 153.7
name: qwen3-8b-bf16
description: llamacpp serving Qwen3-8B (BF16) on Strix Halo
model: /models/Qwen3-8B/Qwen3-8B-BF16.gguf
container: halo-llamacpp-node
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 32768
env: {}
command: |
  llama-server -m /models/Qwen3-8B/Qwen3-8B-BF16.gguf -ngl 999 -fa on --host 0.0.0.0 --port {port} -c {ctx} -np {nseq}
