image_tag: fe7c8b2414
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 32768
env: {}
command: |
  llama-server -m /models/MiMo-V2.5-GGUF/UD-Q2_K_XL/MiMo-V2.5-UD-Q2_K_XL-00001-of-00004.gguf -ngl 999 -fa off --no-mmap --host 0.0.0.0 --port {port} -c {ctx} -np {nseq}
