# Recipe: Qwen3.6-27B (BF16) on Strix Halo - llamacpp
# VERIFIED on InferStation (gfx1151). Best measured decode ~52.6 tok/s
# (in512/out128 streaming). serve cmd is the one run on InferStation's gfx1151 fleet.

recipe_version: "2"
metadata:
  description: llamacpp serving Qwen3.6-27B (BF16) on Strix Halo
  maintainer: radeon-arena
  quantization: BF16
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 52.6
name: qwen3-6-27b-bf16
description: llamacpp serving Qwen3.6-27B (BF16) on Strix Halo
model: /models/Qwen3.6-27B/BF16/Qwen3.6-27B-BF16-00001-of-00002.gguf
source: unsloth/Qwen3.6-27B-GGUF   # HF repo the runner stages this model from (run-recipe.py --setup)
container: llamacpp
# Perf-leaderboard pin (Radeon Arena tracks numbers, not image releases): this
# decode rate was produced by llama.cpp commit fe7c8b2414. Newer :latest builds
# regressed the qwen3.6 / gemma-4 architecture ~8-18% at c=1 (up to ~50% at high
# concurrency), verified by controlled old-vs-new A/B on gfx1151 (2026-06-27).
image_tag: fe7c8b2414
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  ctx: 32768
env: {}
command: |
  llama-server -m /models/Qwen3.6-27B/BF16/Qwen3.6-27B-BF16-00001-of-00002.gguf -ngl 999 -fa on --host 0.0.0.0 --port {port} -c {ctx} -np {nseq}
