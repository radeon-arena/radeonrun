# Recipe: Qwen3.6-35B-A3B (AWQ-4bit) on Strix Halo - vllm
# VERIFIED on InferStation (gfx1151). Best measured decode ~104.3 tok/s
# (in512/out128 streaming). serve cmd is the one run on halo5/halo6.

recipe_version: "2"
metadata:
  description: vllm serving Qwen3.6-35B-A3B (AWQ-4bit) on Strix Halo
  maintainer: JoursBleu
  quantization: AWQ-4bit
  measured:
    gpu: "Radeon 8060S (Strix Halo, gfx1151)"
    profile: halo-arena-v1
    decode_toks_per_s: 104.3
name: qwen3-6-35b-a3b-awq-4bit
description: vllm serving Qwen3.6-35B-A3B (AWQ-4bit) on Strix Halo
model: /models/Qwen3.6-35B-A3B-AWQ-4bit
container: halo-vllm
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
env: {}
command: |
  vllm serve /models/Qwen3.6-35B-A3B-AWQ-4bit --host 0.0.0.0 --port {port} --max-num-seqs {nseq} --dtype float16 --attention-backend TRITON_ATTN --max-model-len 2304 --gpu-memory-utilization 0.85
